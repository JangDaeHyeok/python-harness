# Python Harness 코드 컨벤션
# Python 3.11+ / pytest / ruff / mypy strict / 하네스 아키텍처 기준
# TypeScript·Next·Nest 규칙은 포함하지 않는다.

conventions:
  # ── 타입 안전성 ─────────────────────────────────────────────
  - id: type-hints-required
    description: "모든 public 함수·메서드에 타입 힌트(파라미터 + 반환 타입)를 추가한다."
    category: type-safety
    severity: error
    tags: [typing, mypy, public-api]

  - id: no-any-without-annotation
    description: "Any 타입은 명시적 주석 없이 사용하지 않는다. from typing import Any 후 변수에 직접 annotate."
    category: type-safety
    severity: warning
    tags: [typing, mypy]

  - id: dataclass-field-annotations
    description: "dataclass 필드는 모두 타입 어노테이션을 가져야 한다. field(default_factory=...) 포함."
    category: type-safety
    severity: error
    tags: [typing, dataclass]

  # ── 아키텍처 규칙 ────────────────────────────────────────────
  - id: sensors-no-agents-import
    description: "harness/sensors/ 모듈은 harness/agents/ 를 import하면 안 된다 (단방향 의존성)."
    category: architecture
    severity: error
    tags: [architecture, dependency, sensors, agents]

  - id: computational-sensors-first
    description: "LLM 기반 추론 센서 실행 전에 lint·type-check·test 등 연산적 센서를 먼저 실행한다."
    category: architecture
    severity: warning
    tags: [architecture, sensors, performance]

  - id: review-no-agents-import
    description: "harness/review/ 모듈은 harness/agents/ 를 import하지 않는다. 순수 로직·도구 레이어만 사용."
    category: architecture
    severity: warning
    tags: [architecture, dependency, review]

  # ── 보안 ──────────────────────────────────────────────────
  - id: shell-safe-exec
    description: "셸 명령 실행은 harness/tools/shell.py의 run_command_safe / validate_command를 통해서만 수행한다."
    category: security
    severity: error
    tags: [security, shell, subprocess]

  - id: path-validation
    description: "파일 경로 접근 전 validate_path()로 프로젝트 디렉터리 내부인지 확인한다."
    category: security
    severity: error
    tags: [security, path, filesystem]

  - id: no-eval-exec
    description: "eval() / exec() 사용을 금지한다. 코드 인젝션 위험."
    category: security
    severity: error
    tags: [security, injection]

  # ── API·파싱 ───────────────────────────────────────────────
  - id: safe-parse-fallback
    description: "LLM·외부 API 응답 파싱 실패 시 예외를 전파하지 말고 안전한 실패 결과(빈 객체·기본값)를 반환한다."
    category: robustness
    severity: error
    tags: [parsing, api, llm, error-handling]

  - id: json-parse-in-try-except
    description: "json.loads() 호출은 반드시 try/except json.JSONDecodeError 블록으로 감싼다."
    category: robustness
    severity: error
    tags: [parsing, json, error-handling]

  # ── 로깅·디버깅 ───────────────────────────────────────────
  - id: no-print-in-harness
    description: "harness/ 패키지 내부에서 print() 사용 금지. logging 모듈을 사용한다."
    category: maintainability
    severity: warning
    tags: [logging, debug]

  - id: logger-per-module
    description: "각 모듈 최상단에 logger = logging.getLogger(__name__)을 선언한다."
    category: maintainability
    severity: info
    tags: [logging]

  # ── 테스트 가능성 ─────────────────────────────────────────
  - id: pure-logic-separation
    description: "LLM 의존 로직과 순수 결정적 로직을 분리한다. 순수 함수는 단위 테스트 가능해야 한다."
    category: testability
    severity: warning
    tags: [testing, llm, pure-function]

  - id: no-side-effects-in-init
    description: "__init__에서 파일 I/O·네트워크 호출 등 부작용 있는 작업을 수행하지 않는다."
    category: testability
    severity: warning
    tags: [testing, init, side-effects]

  # ── 코드 스타일 ───────────────────────────────────────────
  - id: line-length-100
    description: "한 줄 최대 100자. ruff의 line-length = 100 설정을 따른다."
    category: style
    severity: info
    tags: [style, ruff]

  - id: from-future-annotations
    description: "모든 모듈 최상단에 from __future__ import annotations를 추가한다."
    category: style
    severity: info
    tags: [style, typing, python311]
